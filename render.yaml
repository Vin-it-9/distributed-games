## Render.com Blueprint — one long-lived Node process that hosts both the
## Next.js app and the Socket.IO server (WebSockets stay open across
## requests, which is what Vercel's serverless functions cannot do).
##
## Deploy:
##   1. Dashboard → Blueprints → New Blueprint Instance
##   2. Pick this repo → Apply
##   3. Wait ~3 min, then open the onrender.com URL.
services:
  - type: web
    name: distributed-games
    runtime: node
    plan: free
    region: singapore
    branch: main
    # NPM_CONFIG_PRODUCTION=false forces npm to install devDependencies
    # (typescript, postcss, tailwindcss, @types/*) which Next.js needs to
    # compile. The runtime itself still sees NODE_ENV=production below.
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
